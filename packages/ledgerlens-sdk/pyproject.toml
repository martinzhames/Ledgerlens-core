[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "ledgerlens-sdk"
version = "0.1.0"
description = "Typed Python client for the LedgerLens wash-trading detection API"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.6.0",
]

[project.optional-dependencies]
test = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]

[project.urls]
Homepage = "https://github.com/Ledger-Lenz/Ledgerlens-core"
Repository = "https://github.com/Ledger-Lenz/Ledgerlens-core"

[tool.hatch.build.targets.wheel]
packages = ["src/ledgerlens"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
